# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - BudgetTracker-staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install ABP CLI
        run: dotnet tool install -g Volo.Abp.Cli

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Install ABP libs
        run: abp install-libs -p BudgetTracker.csproj

      - name: Build with dotnet
        run: dotnet build BudgetTracker.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish BudgetTracker.csproj -c Release -o ./publish/wwwroot
      
      - name: Copy global libs to publish/wwwroot/lib
        shell: powershell
        run: |
          $identityLib = "./publish/wwwroot/Identity/lib"
          $globalLib = "./publish/wwwroot/lib"
          if (Test-Path $identityLib) {
              New-Item -ItemType Directory -Force $globalLib
              Copy-Item -Recurse "$identityLib\*" $globalLib
              Write-Host "Copied Identity libs to global lib"
          } else {
              Write-Host "No Identity libs found in publish, skipping copy"
          }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish/wwwroot

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E1727EB823B2415698495CD848B7D054 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D6A67E5F04F94E4FB0E68DFD05C4D5E0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8019B4FCA758491DA6C7F16CC9663CF7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BudgetTracker-staging'
          slot-name: 'Production'
          package: .
          
